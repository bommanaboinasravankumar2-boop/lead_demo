<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<div id="root"></div>
<style>
  :root {
    --ink: #1c2b2e;
    --paper: #f6f3ec;
    --brass: #b8893f;
    --brass-deep: #8f6526;
    --sage: #5c7266;
    --line: #d9d2c2;
    --hot: #c1502e;
  }
  * { box-sizing: border-box; }
  #root {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100%;
    padding: 0;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 36px 24px 60px; }
  .eyebrow {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    color: var(--sage);
    font-size: 14px;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 34px;
    line-height: 1.15;
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }
  .sub { color: #51605c; font-size: 15px; line-height: 1.5; max-width: 540px; margin-bottom: 28px; }
  .panel {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 28px;
    position: relative;
  }
  .panel::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--brass), var(--sage));
  }
  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--brass-deep);
    font-weight: 600;
    margin: 16px 0 6px;
  }
  label:first-child { margin-top: 0; }
  textarea, input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: #fcfbf8;
    color: var(--ink);
  }
  textarea { resize: vertical; min-height: 80px; }
  textarea:focus, input:focus { outline: 2px solid var(--brass); outline-offset: 1px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  button.go {
    margin-top: 22px;
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 13px;
    font-size: 14px;
    letter-spacing: 0.03em;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s ease;
  }
  button.go:hover:not(:disabled) { background: var(--brass-deep); }
  button.go:disabled { opacity: 0.55; cursor: default; }
  .presets { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .preset-btn {
    font-size: 12px;
    border: 1px solid var(--line);
    background: #fcfbf8;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--sage);
  }
  .preset-btn:hover { border-color: var(--brass); color: var(--brass-deep); }

  .result { margin-top: 24px; }
  .score-card {
    display: flex; align-items: center; gap: 18px;
    border: 1px solid var(--line);
    background: #fcfbf8;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .score-num {
    font-family: Georgia, serif;
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
    min-width: 64px;
  }
  .score-meta { font-size: 13px; color: #51605c; line-height: 1.5; }
  .tag {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .tag.hot { background: #fbe6df; color: var(--hot); }
  .tag.warm { background: #f6ead2; color: var(--brass-deep); }
  .tag.cold { background: #e7ece9; color: var(--sage); }

  .block { margin-bottom: 14px; }
  .block h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--sage);
    margin: 0 0 6px;
  }
  .block p, .block li { font-size: 14px; line-height: 1.55; margin: 0; }
  ul.qlist { padding-left: 18px; margin: 0; }
  ul.qlist li { margin-bottom: 4px; }
  .draft {
    background: #fcfbf8;
    border-left: 3px solid var(--brass);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    font-family: Georgia, serif;
  }
  .footer-note {
    margin-top: 30px;
    font-size: 12px;
    color: #8a9590;
    border-top: 1px solid var(--line);
    padding-top: 14px;
    line-height: 1.6;
  }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(246,243,236,0.4);
    border-top-color: var(--paper);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: var(--hot); font-size: 13px; margin-top: 10px; }
</style>

<script type="text/babel">
const { useState } = React;

const PRESETS = [
  {
    label: "Hot buyer",
    name: "Megan Tran",
    message: "Hi, I'm relocating for a new job and need to close on a 3BR home within 6 weeks. Pre-approved for $650k with Chase. Looking in the Maple Heights school district specifically.",
    source: "Zillow inquiry"
  },
  {
    label: "Just browsing",
    name: "J. Park",
    message: "saw your listing on the 4 bed colonial, what's the price",
    source: "Facebook Marketplace"
  },
  {
    label: "Future seller",
    name: "Donna Reyes",
    message: "Thinking about selling our house sometime next year once the kids finish school, just curious what it might be worth in this market.",
    source: "Website form"
  }
];

function App() {
  const [name, setName] = useState("");
  const [source, setSource] = useState("");
  const [message, setMessage] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  const fillPreset = (p) => {
    setName(p.name);
    setSource(p.source);
    setMessage(p.message);
    setResult(null);
    setError(null);
  };

  const run = async () => {
    if (!message.trim()) return;
    setLoading(true);
    setError(null);
    setResult(null);
    try {
      const sys = `You are a lead-qualification assistant for a real estate agent. Given an inbound lead's message, you must:
1. Score the lead 1-100 on how likely they are to transact in the next 90 days and how serious/qualified they are.
2. Classify as "hot", "warm", or "cold".
3. List 2-3 short qualifying questions the agent should still ask.
4. Write a short, warm, non-pushy draft reply (3-4 sentences) the agent could send immediately, personalized to the lead's message.
5. Give a one-line reason for the score.

Respond ONLY with valid JSON, no markdown fences, no preamble, in this exact shape:
{"score": number, "tier": "hot"|"warm"|"cold", "reason": string, "questions": [string, string, string], "draft_reply": string}`;

      const userMsg = `Lead name: ${name || "Unknown"}\nSource: ${source || "Unknown"}\nMessage: ${message}`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: sys,
          messages: [{ role: "user", content: userMsg }]
        })
      });
      const data = await response.json();
      const text = data.content.map(b => b.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setResult(parsed);
    } catch (e) {
      console.error(e);
      setError("Couldn't score this lead. Try again in a moment.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="wrap">
      <div className="eyebrow">For Maple & Co. Realty — demo</div>
      <h1>Every lead, qualified in seconds.</h1>
      <p className="sub">
        Paste in a real inbound message — from your website form, Zillow, or Facebook —
        and see how it gets scored, what to ask next, and a reply ready to send before
        the lead goes cold.
      </p>

      <div className="presets">
        {PRESETS.map((p, i) => (
          <button key={i} className="preset-btn" onClick={() => fillPreset(p)}>{p.label}</button>
        ))}
      </div>

      <div className="panel">
        <div className="row">
          <div>
            <label>Lead name</label>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Megan Tran" />
          </div>
          <div>
            <label>Source</label>
            <input value={source} onChange={e => setSource(e.target.value)} placeholder="e.g. Zillow inquiry" />
          </div>
        </div>
        <label>Their message</label>
        <textarea
          value={message}
          onChange={e => setMessage(e.target.value)}
          placeholder="Paste the lead's inbound message here..."
        />
        <button className="go" onClick={run} disabled={loading || !message.trim()}>
          {loading ? (<><span className="spinner"></span>Qualifying lead…</>) : "Qualify this lead"}
        </button>
        {error && <div className="err">{error}</div>}

        {result && (
          <div className="result">
            <div className="score-card">
              <div className="score-num" style={{
                color: result.tier === "hot" ? "var(--hot)" : result.tier === "warm" ? "var(--brass-deep)" : "var(--sage)"
              }}>{result.score}</div>
              <div className="score-meta">
                <span className={`tag ${result.tier}`}>{result.tier}</span>
                <div>{result.reason}</div>
              </div>
            </div>

            <div className="block">
              <h3>Ask before you call</h3>
              <ul className="qlist">
                {result.questions.map((q, i) => <li key={i}>{q}</li>)}
              </ul>
            </div>

            <div className="block">
              <h3>Draft reply — ready to send</h3>
              <div className="draft">{result.draft_reply}</div>
            </div>
          </div>
        )}

        <div className="footer-note">
          This runs on a live AI model — try editing the message above and re-running it.
          In production this connects directly to your CRM or inbox, so leads get scored
          and answered the moment they come in, not whenever you get a free minute.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
